<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Your Interest</title>
    <meta name="description" content="Register your interest and we'll keep you updated on our latest news.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --primary-light: rgba(79, 70, 229, 0.08);
            --bg-start: #0f0c29;
            --bg-mid: #302b63;
            --bg-end: #24243e;
            --surface: rgba(255, 255, 255, 0.07);
            --surface-hover: rgba(255, 255, 255, 0.11);
            --text-main: #F9FAFB;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.12);
            --border-focus: rgba(129, 120, 255, 0.7);
            --focus-ring: rgba(79, 70, 229, 0.25);
            --placeholder: rgba(255, 255, 255, 0.3);
            --error: #F87171;
            --success: #34D399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            color: var(--text-main);
        }

        /* --- Card --- */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1.75rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 460px;
            padding: 2.75rem 2.25rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(99, 88, 255, 0.25) 0%, transparent 70%);
            pointer-events: none;
        }

        /* --- Header --- */
        .form-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 24px rgba(99, 88, 255, 0.35);
        }

        .form-icon svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .form-header h1 {
            font-size: 1.65rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .form-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* --- Input Group with Floating-style Placeholder --- */
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.45rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.85rem;
            font-size: 0.97rem;
            font-family: inherit;
            font-weight: 400;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            -webkit-appearance: none;
        }

        .input-group input::placeholder {
            color: var(--placeholder);
            font-weight: 300;
        }

        .input-group input:hover {
            border-color: rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.09);
        }

        .input-group input:focus {
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        .input-group input:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: #818CF8;
        }

        .input-wrapper .input-icon {
            /* put icon before input in HTML, so use sibling trick via wrapper */
        }

        /* --- Submit Button --- */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            color: white;
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            border: none;
            border-radius: 0.875rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
            margin-top: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            box-shadow: 0 4px 20px rgba(99, 88, 255, 0.3);
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(99, 88, 255, 0.45);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        /* --- Spinner --- */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Error message --- */
        .error-msg {
            font-size: 0.8rem;
            color: var(--error);
            margin-top: 0.4rem;
            display: none;
        }
        .input-group.has-error input {
            border-color: var(--error);
        }
        .input-group.has-error .error-msg {
            display: block;
        }

        /* --- Thank You Screen --- */
        #thank-you {
            display: none;
            text-align: center;
            padding: 1.5rem 0;
        }

        .ty-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #059669, #34D399);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(52, 211, 153, 0.35);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes pop {
            from { transform: scale(0.4); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .ty-icon svg {
            width: 36px;
            height: 36px;
            stroke: white;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #thank-you h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        #thank-you p {
            color: var(--text-muted);
            font-size: 0.92rem;
            line-height: 1.6;
        }

        /* --- Transitions --- */
        #form-section {
            transition: opacity 0.3s ease;
        }

        /* --- Mobile --- */
        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding-top: 2rem;
                padding-bottom: 2rem;
            }
            .card {
                border-radius: 1.25rem;
                padding: 2rem 1.5rem;
            }
            .form-header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Form Section -->
    <div id="form-section">
        <div class="form-icon">
            <!-- envelope icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
        </div>
        <div class="form-header">
            <h1>Register Your Interest</h1>
            <p>Fill in your details below and we'll be in touch with all the latest updates.</p>
        </div>

        <form id="interest-form" novalidate>
            <!-- Name -->
            <div class="input-group" id="group-name">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="e.g. Jane Smith"
                        autocomplete="name"
                        required
                    >
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <span class="error-msg">Please enter your full name.</span>
            </div>

            <!-- Phone -->
            <div class="input-group" id="group-phone">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="e.g. +60 12-345 6789"
                        autocomplete="tel"
                        required
                    >
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3-8.55A2 2 0 0 1 3.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 9.91a16 16 0 0 0 5.91 5.91l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                </div>
                <span class="error-msg">Please enter a valid phone number.</span>
            </div>

            <!-- Email -->
            <div class="input-group" id="group-email">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="e.g. jane@company.com"
                        autocomplete="email"
                        required
                    >
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
                    </svg>
                </div>
                <span class="error-msg">Please enter a valid email address.</span>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span class="btn-text">Submit My Details</span>
                <div class="spinner"></div>
            </button>
        </form>
    </div>

    <!-- Thank You Section -->
    <div id="thank-you">
        <div class="ty-icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h2>Thank You! 🎉</h2>
        <p>We've received your details and will be in touch soon. Keep an eye on your inbox!</p>
    </div>

</div>

<script>
    const form = document.getElementById('interest-form');
    const btn  = document.getElementById('submit-btn');

    function getField(id) { return document.getElementById(id); }
    function getGroup(id) { return document.getElementById('group-' + id); }

    function setError(fieldId, show) {
        const group = getGroup(fieldId);
        if (show) group.classList.add('has-error');
        else group.classList.remove('has-error');
    }

    function validate() {
        let valid = true;
        const name  = getField('name').value.trim();
        const phone = getField('phone').value.trim();
        const email = getField('email').value.trim();

        if (!name) { setError('name', true); valid = false; } else setError('name', false);
        if (!phone || phone.length < 6) { setError('phone', true); valid = false; } else setError('phone', false);
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', true); valid = false; } else setError('email', false);

        return valid;
    }

    // Clear error on input
    ['name','phone','email'].forEach(id => {
        getField(id).addEventListener('input', () => setError(id, false));
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validate()) return;

        // Loading state
        btn.classList.add('loading');
        btn.disabled = true;

        const payload = {
            name:  getField('name').value.trim(),
            phone: getField('phone').value.trim(),
            email: getField('email').value.trim(),
        };

        try {
            await fetch('https://zslee.zeabur.app/webhook/formSubmit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
        } catch (_) {
            // Webhook errors are non-blocking — still show thank you
        }

        // Fade out form, show thank you
        const formSection = document.getElementById('form-section');
        formSection.style.opacity = '0';
        setTimeout(() => {
            formSection.style.display = 'none';
            const ty = document.getElementById('thank-you');
            ty.style.display = 'block';
        }, 300);
    });
</script>

</body>
</html>
